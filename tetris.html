<meta charset="utf-8">
<title>Тетрис</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 20px;
    background: radial-gradient(1200px 600px at 50% -10%, #1a1d3a, #0b0d1c 60%);
    color: #e8e8f0;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    user-select: none;
  }
  h1 { margin: 0; font-weight: 700; letter-spacing: 6px; font-size: 26px;
       background: linear-gradient(90deg,#7c83ff,#4ec8f5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .wrap { display: flex; gap: 22px; align-items: flex-start; }
  canvas#game {
    background: #05060f; border: 2px solid #2a2d4a; border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .panel { width: 200px; display: flex; flex-direction: column; gap: 12px; }
  .box { background: #171a2e; border: 1px solid #2a2d4a; border-radius: 10px; padding: 12px 14px; }
  .row { display: flex; gap: 12px; }
  .row .box { flex: 1; }
  .label { font-size: 11px; opacity: .55; text-transform: uppercase; letter-spacing: 1px; }
  .value { font-size: 24px; font-weight: 800; }
  .next-box { display: flex; flex-direction: column; align-items: center; }
  canvas#next { margin-top: 6px; }
  .btns { display: flex; gap: 8px; }
  button {
    flex: 1; padding: 10px 0; font-size: 14px; font-weight: 600; border: none; border-radius: 8px;
    cursor: pointer; transition: transform .05s, filter .15s;
  }
  button:active { transform: translateY(1px); }
  .btn-primary { background: #7c83ff; color: #fff; }
  .btn-ghost { background: #232748; color: #cfd2f0; }
  button:hover { filter: brightness(1.1); }
  .hint { font-size: 12px; line-height: 1.7; opacity: .7; }
  .hint b { color: #7c83ff; }
  .lb-title { font-size: 11px; opacity: .55; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .lb { list-style: none; margin: 0; padding: 0; font-size: 13px; }
  .lb li { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #21243f; }
  .lb li:last-child { border: none; }
  .lb .nm { opacity: .85; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
  .lb .sc { font-weight: 700; color: #4ec8f5; }
  .lb .empty { opacity: .4; font-style: italic; }
  .lb li.fresh .sc { color: #5cf54e; }

  #over {
    position: fixed; inset: 0; display: none; z-index: 10;
    align-items: center; justify-content: center;
    background: rgba(5,6,15,.88); backdrop-filter: blur(3px);
  }
  #over .card {
    background: #171a2e; border: 1px solid #2a2d4a; border-radius: 14px;
    padding: 28px 32px; text-align: center; width: 320px;
    box-shadow: 0 20px 80px rgba(0,0,0,.7);
  }
  #over h2 { margin: 0 0 4px; letter-spacing: 2px; }
  #over .final { font-size: 40px; font-weight: 800; color: #4ec8f5; margin: 8px 0 2px; }
  #over .sub { opacity: .6; font-size: 13px; margin-bottom: 18px; }
  #over input {
    width: 100%; padding: 11px 12px; font-size: 15px; border-radius: 8px;
    border: 1px solid #3a3f6a; background: #0d0f1e; color: #fff; margin-bottom: 12px; text-align: center;
  }
  #over input:focus { outline: none; border-color: #7c83ff; }
  #over .over-btns { display: flex; gap: 8px; }
</style>

<h1>ТЕТРИС</h1>
<div class="wrap">
  <canvas id="game" width="300" height="600"></canvas>
  <div class="panel">
    <div class="row">
      <div class="box"><div class="label">Очки</div><div class="value" id="score">0</div></div>
      <div class="box"><div class="label">Уровень</div><div class="value" id="level">1</div></div>
    </div>
    <div class="box"><div class="label">Линии</div><div class="value" id="lines">0</div></div>
    <div class="box next-box"><div class="label">Следующая</div><canvas id="next" width="120" height="80"></canvas></div>
    <div class="btns">
      <button class="btn-primary" id="startBtn">▶ Старт</button>
      <button class="btn-ghost" id="pauseBtn">⏸ Пауза</button>
    </div>
    <div class="btns">
      <button class="btn-ghost" id="resetBtn">⟳ Сброс</button>
      <button class="btn-ghost" id="muteBtn">🔊 Звук</button>
    </div>
    <div class="box hint">
      <b>←</b> <b>→</b> двигать · <b>↑</b> поворот<br>
      <b>↓</b> ускорить · <b>Пробел</b> сбросить · <b>P</b> пауза
    </div>
    <div class="box">
      <div class="lb-title">🏆 Лучшие результаты</div>
      <ol class="lb" id="leaderboard"></ol>
    </div>
  </div>
</div>

<div id="over">
  <div class="card">
    <h2>Игра окончена</h2>
    <div class="final" id="finalScore">0</div>
    <div class="sub" id="finalSub">линий: 0 · уровень: 1</div>
    <input id="nameInput" maxlength="14" placeholder="Твоё имя" autocomplete="off">
    <div class="over-btns">
      <button class="btn-primary" id="saveBtn">Сохранить</button>
      <button class="btn-ghost" id="againBtn">Ещё раз</button>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');
  const COLS = 10, ROWS = 20, SIZE = 30;
  const LB_KEY = 'tetris_leaderboard_v1';

  const SHAPES = {
    I: { color: '#4ec8f5', cells: [[0,1],[1,1],[2,1],[3,1]] },
    O: { color: '#f5d24e', cells: [[0,0],[1,0],[0,1],[1,1]] },
    T: { color: '#b04ef5', cells: [[0,0],[1,0],[2,0],[1,1]] },
    S: { color: '#5cf54e', cells: [[1,0],[2,0],[0,1],[1,1]] },
    Z: { color: '#f54e5c', cells: [[0,0],[1,0],[1,1],[2,1]] },
    J: { color: '#4e6cf5', cells: [[0,0],[0,1],[1,1],[2,1]] },
    L: { color: '#f5964e', cells: [[2,0],[0,1],[1,1],[2,1]] },
  };
  const KEYS = Object.keys(SHAPES);

  let board, cur, nextType, score, lines, level;
  let phase = 'idle';                 // idle | playing | paused | clearing | over
  let clearingRows = [], clearStart = 0;
  let lastDrop = 0, lastT = 0;
  let bag = [];
  let particles = [];
  let shake = 0;
  let muted = false;

  // ---------- Звук (WebAudio, без файлов) ----------
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type, gain) {
    if (muted || !audioCtx) return;
    try {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      g.gain.value = gain || 0.04;
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      o.start(t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.stop(t + dur);
    } catch (e) {}
  }
  function clearSound(n) {
    const notes = n >= 4 ? [523, 659, 784, 1047] : [440, 554, 659].slice(0, n + 1);
    notes.forEach((f, i) => setTimeout(() => beep(f, 0.18, 'triangle', 0.05), i * 60));
  }

  // ---------- Состояние ----------
  function resetState() {
    board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    score = 0; lines = 0; level = 1;
    clearingRows = []; cur = null; nextType = null;
    bag = []; particles = []; shake = 0;
    updateHUD();
  }
  function dropInterval() { return Math.max(100, 700 - (level - 1) * 60); }
  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('lines').textContent = lines;
    document.getElementById('level').textContent = level;
  }

  // ---------- Подбор фигур: "мешок из 7" + анализ поля ----------
  function refillBag() {
    bag = KEYS.slice();
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }
  function analyzeBoard() {
    const h = Array(COLS).fill(0);
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) { if (board[y][x]) { h[x] = ROWS - y; break; } }
    }
    const maxH = Math.max(...h);
    let wellDepth = 0;
    for (let x = 0; x < COLS; x++) {
      const l = x > 0 ? h[x - 1] : ROWS, r = x < COLS - 1 ? h[x + 1] : ROWS;
      wellDepth = Math.max(wellDepth, Math.min(l, r) - h[x]);
    }
    return { maxH, wellDepth };
  }
  function nextPieceType() {
    if (bag.length === 0) refillBag();
    // Анализ поля: если стек высокий и есть глубокий колодец — раньше выдаём I-фигуру
    const info = analyzeBoard();
    if (info.maxH >= ROWS * 0.6 && info.wellDepth >= 3 && bag.includes('I')) {
      bag = ['I', ...bag.filter(t => t !== 'I')];
    }
    return bag.shift();
  }

  function makePiece(type) {
    const s = SHAPES[type];
    return { type, color: s.color, cells: s.cells.map(c => [...c]), x: 3, y: 0 };
  }
  function spawnNext() {
    cur = makePiece(nextType);
    nextType = nextPieceType();
    drawNext();
    if (collides(cur.cells, cur.x, cur.y)) endGame();
  }

  function collides(cells, px, py) {
    return cells.some(([cx, cy]) => {
      const x = px + cx, y = py + cy;
      return x < 0 || x >= COLS || y >= ROWS || (y >= 0 && board[y][x]);
    });
  }
  function rotate(cells) {
    let r = cells.map(([x, y]) => [y, -x]);
    const minX = Math.min(...r.map(c => c[0])), minY = Math.min(...r.map(c => c[1]));
    return r.map(([x, y]) => [x - minX, y - minY]);
  }
  function merge() {
    cur.cells.forEach(([cx, cy]) => {
      const x = cur.x + cx, y = cur.y + cy;
      if (y >= 0) board[y][x] = cur.color;
    });
  }

  // ---------- Частицы (эффект схлопывания) ----------
  function spawnParticles(rows) {
    rows.forEach(y => {
      for (let x = 0; x < COLS; x++) {
        const color = board[y][x] || '#fff';
        for (let i = 0; i < 3; i++) {
          particles.push({
            x: x * SIZE + SIZE / 2, y: y * SIZE + SIZE / 2,
            vx: (Math.random() - 0.5) * 7,
            vy: (Math.random() - 0.5) * 6 - 3,
            life: 1, color, size: 4 + Math.random() * 5
          });
        }
      }
    });
  }
  function updateParticles() {
    for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.life -= 0.024; }
    particles = particles.filter(p => p.life > 0);
  }

  function lockPiece() {
    merge();
    beep(150, 0.07, 'sawtooth', 0.05);      // глухой "удар" фиксации
    shake = Math.max(shake, 3);
    const full = [];
    for (let y = 0; y < ROWS; y++) if (board[y].every(c => c)) full.push(y);
    if (full.length) {
      spawnParticles(full);
      clearingRows = full; phase = 'clearing'; clearStart = lastT;
      shake = 5 + full.length * 4;
      clearSound(full.length);
    } else spawnNext();
  }
  function finishClear() {
    board = board.filter((_, y) => !clearingRows.includes(y));
    while (board.length < ROWS) board.unshift(Array(COLS).fill(0));
    const n = clearingRows.length;
    score += [0, 100, 300, 500, 800][n] * level;
    lines += n;
    level = Math.floor(lines / 10) + 1;
    clearingRows = [];
    updateHUD();
    phase = 'playing';
    lastDrop = lastT;
    spawnNext();
  }
  function drop(soft) {
    if (phase !== 'playing') return;
    if (!collides(cur.cells, cur.x, cur.y + 1)) { cur.y++; if (soft) { score += 1; updateHUD(); } }
    else lockPiece();
  }
  function hardDrop() {
    if (phase !== 'playing') return;
    let dist = 0;
    while (!collides(cur.cells, cur.x, cur.y + 1)) { cur.y++; score += 2; dist++; }
    updateHUD();
    if (dist > 0) { shake = Math.max(shake, 7); beep(90, 0.1, 'sawtooth', 0.06); }
    lockPiece();
  }

  // ---------- Отрисовка ----------
  function cell(g, x, y, color, s) {
    g.fillStyle = color;
    g.fillRect(x * s + 1, y * s + 1, s - 2, s - 2);
    g.fillStyle = 'rgba(255,255,255,.18)';
    g.fillRect(x * s + 1, y * s + 1, s - 2, 5);
    g.fillStyle = 'rgba(0,0,0,.15)';
    g.fillRect(x * s + 1, y * s + s - 5, s - 2, 4);
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

    // сетка
    ctx.strokeStyle = 'rgba(255,255,255,.03)';
    for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*SIZE,0); ctx.lineTo(x*SIZE,ROWS*SIZE); ctx.stroke(); }
    for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*SIZE); ctx.lineTo(COLS*SIZE,y*SIZE); ctx.stroke(); }

    if (phase === 'idle') {
      ctx.fillStyle = 'rgba(255,255,255,.6)'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('Нажми «Старт» ▶', canvas.width/2, canvas.height/2);
      ctx.textAlign = 'left'; ctx.restore(); return;
    }

    // застывшие блоки
    for (let y = 0; y < ROWS; y++)
      for (let x = 0; x < COLS; x++)
        if (board[y][x]) cell(ctx, x, y, board[y][x], SIZE);

    if (cur && (phase === 'playing' || phase === 'paused')) {
      // ПРИЗРАК — деликатный тонкий контур, а не блоки
      let gy = cur.y;
      while (!collides(cur.cells, cur.x, gy + 1)) gy++;
      ctx.strokeStyle = cur.color + '4d';   // ~30% прозрачности
      ctx.lineWidth = 2;
      cur.cells.forEach(([cx, cy]) => ctx.strokeRect((cur.x+cx)*SIZE+3, (gy+cy)*SIZE+3, SIZE-6, SIZE-6));
      // активная фигура со свечением
      ctx.shadowColor = cur.color; ctx.shadowBlur = 12;
      cur.cells.forEach(([cx, cy]) => cell(ctx, cur.x + cx, cur.y + cy, cur.color, SIZE));
      ctx.shadowBlur = 0;
    }

    // вспышка на схлопывающихся рядах
    if (phase === 'clearing') {
      const k = (t - clearStart) / 400;                 // 0..1
      const alpha = Math.max(0, 0.85 * (1 - k));
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      clearingRows.forEach(y => ctx.fillRect(0, y * SIZE, COLS * SIZE, SIZE));
    }

    // частицы поверх всего
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    if (phase === 'paused') {
      ctx.fillStyle = 'rgba(5,6,15,.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff'; ctx.font = '700 28px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('ПАУЗА', canvas.width/2, canvas.height/2);
      ctx.textAlign = 'left';
    }
    ctx.restore();
  }

  function drawNext() {
    nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (!nextType) return;
    const s = SHAPES[nextType], sz = 20;
    const xs = s.cells.map(c => c[0]), ys = s.cells.map(c => c[1]);
    const w = Math.max(...xs) - Math.min(...xs) + 1, h = Math.max(...ys) - Math.min(...ys) + 1;
    const ox = (nextCanvas.width - w * sz) / 2 - Math.min(...xs) * sz;
    const oy = (nextCanvas.height - h * sz) / 2 - Math.min(...ys) * sz;
    s.cells.forEach(([cx, cy]) => {
      nctx.fillStyle = s.color;
      nctx.fillRect(ox + cx*sz + 1, oy + cy*sz + 1, sz-2, sz-2);
      nctx.fillStyle = 'rgba(255,255,255,.18)';
      nctx.fillRect(ox + cx*sz + 1, oy + cy*sz + 1, sz-2, 4);
    });
  }

  // ---------- Лидерборд ----------
  function loadLB() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch (e) { return []; } }
  function saveLB(list) { try { localStorage.setItem(LB_KEY, JSON.stringify(list)); } catch (e) {} }
  function renderLB(freshIdx) {
    const list = loadLB();
    const el = document.getElementById('leaderboard');
    if (!list.length) { el.innerHTML = '<li class="empty">Пока пусто — сыграй!</li>'; return; }
    el.innerHTML = list.map((r, i) =>
      `<li class="${i === freshIdx ? 'fresh' : ''}"><span class="nm">${i+1}. ${escapeHtml(r.name)}</span><span class="sc">${r.score}</span></li>`
    ).join('');
  }
  function escapeHtml(s) { return String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
  function commitScore() {
    const name = (document.getElementById('nameInput').value.trim()) || 'Аноним';
    const list = loadLB();
    const entry = { name, score, lines, level };
    list.push(entry);
    list.sort((a, b) => b.score - a.score);
    const trimmed = list.slice(0, 10);
    saveLB(trimmed);
    renderLB(trimmed.indexOf(entry));
    document.getElementById('over').style.display = 'none';
    phase = 'idle';
  }

  // ---------- Управление игрой ----------
  function updatePauseBtn() {
    document.getElementById('pauseBtn').textContent = (phase === 'paused') ? '▶ Продолжить' : '⏸ Пауза';
  }
  function startGame() {
    ensureAudio();
    if (phase === 'playing' || phase === 'clearing' || phase === 'paused') return;
    resetState();
    phase = 'playing';
    refillBag();
    nextType = nextPieceType();
    lastDrop = lastT;
    spawnNext();
    updatePauseBtn();
  }
  function togglePause() {
    if (phase === 'playing') phase = 'paused';
    else if (phase === 'paused') { phase = 'playing'; lastDrop = lastT; }
    else return;
    updatePauseBtn();
  }
  function resetGame() {
    resetState();
    phase = 'idle';
    document.getElementById('over').style.display = 'none';
    updatePauseBtn();
  }
  function endGame() {
    phase = 'over';
    beep(200, 0.3, 'sawtooth', 0.05);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalSub').textContent = `линий: ${lines} · уровень: ${level}`;
    const inp = document.getElementById('nameInput');
    inp.value = '';
    document.getElementById('over').style.display = 'flex';
    setTimeout(() => inp.focus(), 50);
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('pauseBtn').addEventListener('click', () => { ensureAudio(); togglePause(); });
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('muteBtn').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('muteBtn').textContent = muted ? '🔇 Тихо' : '🔊 Звук';
    if (!muted) ensureAudio();
  });
  document.getElementById('saveBtn').addEventListener('click', commitScore);
  document.getElementById('againBtn').addEventListener('click', () => { document.getElementById('over').style.display='none'; startGame(); });
  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') commitScore(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
    if (phase !== 'playing') return;
    if (e.key === 'ArrowLeft'  && !collides(cur.cells, cur.x - 1, cur.y)) { cur.x--; beep(220, 0.04, 'square', 0.02); }
    else if (e.key === 'ArrowRight' && !collides(cur.cells, cur.x + 1, cur.y)) { cur.x++; beep(220, 0.04, 'square', 0.02); }
    else if (e.key === 'ArrowDown') { drop(true); lastDrop = lastT; }
    else if (e.key === 'ArrowUp') { const r = rotate(cur.cells); if (!collides(r, cur.x, cur.y)) { cur.cells = r; beep(330, 0.05, 'square', 0.03); } }
    else if (e.key === ' ') { e.preventDefault(); hardDrop(); }
  });

  function loop(t) {
    lastT = t;
    if (phase === 'playing' && t - lastDrop > dropInterval()) { drop(false); lastDrop = t; }
    if (phase === 'clearing' && t - clearStart > 400) finishClear();
    updateParticles();
    if (shake > 0) { shake *= 0.88; if (shake < 0.4) shake = 0; }
    draw(t);
    requestAnimationFrame(loop);
  }

  resetState();
  renderLB(-1);
  updatePauseBtn();
  requestAnimationFrame(loop);
</script>
